<svg viewBox="0 0 300 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Icon - Circle background -->
  <circle cx="60" cy="60" r="50" fill="url(#mainGrad)"/>
  
  <!-- Letter K -->
  <g>
    <!-- Vertical line of K -->
    <rect x="30" y="30" width="11" height="60" rx="5.5" fill="white"/>
    
    <!-- Top diagonal of K -->
    <path d="M 41 40 L 65 55" stroke="white" stroke-width="11" stroke-linecap="round" fill="none"/>
    
    <!-- Bottom diagonal of K -->
    <path d="M 41 80 L 65 65" stroke="white" stroke-width="11" stroke-linecap="round" fill="none"/>
  </g>
  
  <!-- Letter M -->
  <g>
    <!-- Left vertical line of M -->
    <rect x="75" y="30" width="10" height="60" rx="5" fill="white"/>
    
    <!-- Center peak of M -->
    <path d="M 85 30 L 95 58 L 105 30" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <!-- Right vertical line of M -->
    <rect x="105" y="30" width="10" height="60" rx="5" fill="white"/>
  </g>
  
  <!-- Text - KallMax -->
  <text x="140" y="75" font-size="48" font-weight="900" font-family="'Segoe UI', Arial, sans-serif" fill="#1f2937" letter-spacing="-1.5">KallMax</text>
  
  <!-- Text - Inmobiliaria -->
  <text x="140" y="105" font-size="13" font-weight="600" font-family="'Segoe UI', Arial, sans-serif" fill="#8b5cf6" letter-spacing="0.5">INMOBILIARIA</text>
</svg>
