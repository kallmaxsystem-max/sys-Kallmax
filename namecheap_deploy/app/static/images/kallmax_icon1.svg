<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#grad1)"/>
  
  <!-- Letter K with modern design -->
  <g>
    <!-- Vertical line of K -->
    <rect x="45" y="50" width="16" height="100" rx="8" fill="white"/>
    
    <!-- Top diagonal of K -->
    <path d="M 61 65 L 95 85" stroke="white" stroke-width="16" stroke-linecap="round" fill="none"/>
    
    <!-- Bottom diagonal of K -->
    <path d="M 61 135 L 95 115" stroke="white" stroke-width="16" stroke-linecap="round" fill="none"/>
  </g>
  
  <!-- Letter M with modern design -->
  <g>
    <!-- Left vertical line of M -->
    <rect x="115" y="50" width="14" height="100" rx="7" fill="white"/>
    
    <!-- Center peak of M -->
    <path d="M 129 50 L 145 85 L 161 50" stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <!-- Right vertical line of M -->
    <rect x="161" y="50" width="14" height="100" rx="7" fill="white"/>
  </g>
</svg>
