<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(3deg); }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 40px rgba(168, 85, 247, 0.4), 0 0 80px rgba(168, 85, 247, 0.2); }
            50% { box-shadow: 0 0 60px rgba(236, 72, 153, 0.6), 0 0 120px rgba(236, 72, 153, 0.3); }
        }

        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }

        .slide-in {
            animation: slideIn 0.8s ease-out;
        }

        .float-animation {
            animation: float 6s ease-in-out infinite;
        }

        .glow-animation {
            animation: glow 3s ease-in-out infinite;
        }

        .form-input {
            @apply bg-white dark:bg-slate-800 border-3 border-gray-800 dark:border-white focus:outline-none focus:border-purple-600 dark:focus:border-purple-400 focus:ring-4 focus:ring-purple-500/30 transition-all duration-300 text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-500 font-medium text-base shadow-lg;
            padding: 16px 24px;
            border-radius: 16px;
        }

        .form-input:hover {
            @apply border-purple-700 dark:border-purple-500 shadow-xl shadow-purple-500/20;
        }

        .form-input:focus {
            @apply shadow-2xl shadow-purple-500/30 border-purple-600;
        }

        .form-label {
            @apply text-gray-800 dark:text-white font-bold text-base mb-3 block;
        }

        .btn-primary {
            @apply w-full py-4 px-6 bg-gradient-to-r from-purple-600 via-purple-700 to-purple-600 hover:from-purple-700 hover:via-purple-800 hover:to-purple-700 text-white font-bold text-lg rounded-2xl transition-all duration-500 hover:scale-[1.02] shadow-xl shadow-purple-600/40 hover:shadow-2xl hover:shadow-purple-600/60;
            background-size: 200% auto;
        }

        .btn-secondary {
            @apply w-full py-4 px-6 bg-white/10 backdrop-blur-sm border-2 border-white/30 text-white font-semibold text-base rounded-2xl hover:bg-white/20 hover:border-white/50 transition-all duration-300;
        }

        .glass-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.25) 0%, rgba(255, 255, 255, 0.15) 100%);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(139, 92, 246, 0.37);
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #667eea 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .shimmer {
            background: linear-gradient(to right, transparent 0%, rgba(255,255,255,0.3) 50%, transparent 100%);
            background-size: 1000px 100%;
            animation: shimmer 3s infinite;
        }
    </style>
</head>
<body class="bg-slate-950 min-h-screen">
    <!-- Fondo animado igual que welcome -->
    <div class="fixed inset-0 -z-10 bg-gradient-to-b from-purple-900 via-purple-700 to-slate-950"></div>

    <!-- Elementos decorativos flotantes mejorados -->
    <div class="fixed top-20 right-10 w-96 h-96 bg-purple-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-pulse -z-5"></div>
    <div class="fixed top-1/2 left-1/2 w-96 h-96 bg-pink-400 rounded-full mix-blend-multiply filter blur-3xl opacity-25 animate-pulse -z-5" style="animation-delay: 2s;"></div>
    <div class="fixed bottom-20 left-10 w-80 h-80 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse -z-5" style="animation-delay: 4s;"></div>
    <div class="fixed top-40 left-1/4 w-64 h-64 bg-orange-300 rounded-full mix-blend-multiply filter blur-3xl opacity-15 animate-pulse -z-5" style="animation-delay: 1s;"></div>

    <div class="min-h-screen flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-lg slide-in">
            <!-- Header con Logo y Nombre KallMax EQUILIBRADO -->
            <div class="text-center mb-12 float-animation">
                <!-- Logo KallMax con efecto brillante -->
                <div class="mb-6 flex justify-center">
                    <div class="relative group">
                        <!-- Anillo de luz exterior -->
                        <div class="absolute -inset-4 bg-gradient-to-r from-purple-600 via-pink-500 to-orange-400 rounded-full blur-2xl opacity-60 group-hover:opacity-90 animate-pulse transition duration-1000"></div>
                        <!-- Segundo anillo -->
                        <div class="absolute -inset-2 bg-gradient-to-r from-purple-400 via-pink-400 to-purple-600 rounded-full blur-xl opacity-40 group-hover:opacity-70 transition duration-1000"></div>
                        <!-- Contenedor del logo -->
                        <div class="relative bg-gradient-to-br from-white via-purple-50 to-purple-100 p-6 rounded-2xl shadow-2xl group-hover:shadow-purple-500/50 transition-all duration-500 group-hover:scale-105">
                            <img src="{{ url_for('static', filename='images/kallmax_icon.svg') }}" alt="KallMax Logo" class="h-20 w-20 relative drop-shadow-2xl group-hover:rotate-3 transition-transform duration-700">
                        </div>
                    </div>
                </div>
                
                <!-- Nombre KallMax BALANCEADO -->
                <div class="mb-4">
                    <h1 class="text-5xl md:text-6xl font-black mb-3 tracking-tight leading-none">
                        <span class="bg-gradient-to-r from-white via-purple-100 to-white bg-clip-text text-transparent drop-shadow-2xl">
                            KallMax
                        </span>
                    </h1>
                    <div class="flex items-center justify-center gap-3 mb-4">
                        <div class="h-1 w-16 bg-gradient-to-r from-transparent via-purple-400 to-purple-600 rounded-full"></div>
                        <p class="text-xl font-bold text-purple-200 tracking-wider uppercase">Inmobiliaria</p>
                        <div class="h-1 w-16 bg-gradient-to-r from-purple-600 via-purple-400 to-transparent rounded-full"></div>
                    </div>
                </div>
                
                <!-- Mensaje de bienvenida -->
                <div class="bg-white/5 backdrop-blur-sm border border-white/20 rounded-2xl p-6 mb-2 shadow-xl">
                    <h2 class="text-2xl font-bold text-white mb-2 drop-shadow-lg">¡Bienvenido de nuevo!</h2>
                    <p class="text-base text-purple-100 font-medium flex items-center justify-center gap-2">
                        <i class="fas fa-key text-purple-300"></i>
                        Inicia sesión para continuar
                    </p>
                </div>
            </div>

            <!-- Card contenedor -->
            <div class="glass-card rounded-3xl p-8 shadow-2xl">
                <!-- Formulario -->
                <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-6">
                    
                    <!-- Usuario -->
                    <div>
                        <label for="usuario" class="form-label">
                            <i class="fas fa-user mr-2 text-purple-600 dark:text-purple-400"></i>Usuario
                        </label>
                        <input 
                            type="text" 
                            id="usuario" 
                            name="email" 
                            placeholder="Ingresa tu usuario"
                            required
                            autocomplete="off"
                            class="form-input w-full"
                        >
                    </div>

                    <!-- Contraseña -->
                    <div>
                        <label for="password" class="form-label">
                            <i class="fas fa-lock mr-2 text-purple-600 dark:text-purple-400"></i>Contraseña
                        </label>
                        <div class="relative">
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                placeholder="Ingresa tu contraseña"
                                required
                                autocomplete="off"
                                class="form-input w-full pr-14"
                            >
                            <button 
                                type="button" 
                                onclick="togglePassword()" 
                                class="absolute right-4 top-1/2 -translate-y-1/2 text-purple-600 hover:text-purple-700 dark:text-purple-400 dark:hover:text-purple-300 transition-all duration-300 p-2 hover:bg-purple-100 dark:hover:bg-purple-900/30 rounded-xl"
                                style="border-radius: 12px;"
                            >
                                <i class="fas fa-eye text-lg" id="toggleIcon"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Recuérdame y Olvido contraseña -->
                    <div class="flex items-center justify-between pt-2">
                        <label class="flex items-center cursor-pointer group">
                            <div class="relative">
                                <input 
                                    type="checkbox" 
                                    name="remember"
                                    class="w-5 h-5 rounded-lg border-2 border-gray-300 dark:border-gray-600 bg-white dark:bg-slate-700 text-purple-600 focus:ring-2 focus:ring-purple-500 cursor-pointer accent-purple-600 transition-all"
                                >
                            </div>
                            <span class="ml-3 text-white font-medium text-sm group-hover:text-purple-200 transition-colors">Recuérdame</span>
                        </label>
                        <a href="#" class="text-white hover:text-purple-200 font-semibold text-sm transition-colors underline-offset-2 hover:underline">¿Olvidaste tu contraseña?</a>
                    </div>

                    <!-- Botones en la misma línea -->
                    <div class="flex gap-4 pt-6">
                        <button type="submit" class="flex-1 py-4 px-6 bg-gradient-to-r from-purple-600 via-purple-700 to-purple-600 hover:from-purple-700 hover:via-purple-800 hover:to-purple-700 text-white font-bold text-base rounded-2xl transition-all duration-500 hover:scale-[1.02] shadow-xl shadow-purple-600/40 hover:shadow-2xl hover:shadow-purple-600/60 group">
                            <span class="flex items-center justify-center">
                                <i class="fas fa-arrow-right mr-2 group-hover:translate-x-1 transition-transform"></i>
                                Iniciar Sesión
                            </span>
                        </button>
                        <a href="{{ url_for('auth.welcome') }}" class="flex-1 py-4 px-6 bg-white/10 backdrop-blur-sm border-2 border-white/30 text-white font-semibold text-base rounded-2xl hover:bg-white/20 hover:border-white/50 transition-all duration-300 inline-flex items-center justify-center">
                            <i class="fas fa-arrow-left mr-2"></i>
                            Volver
                        </a>
                    </div>
                </form>
            </div>

            <!-- Footer Info -->
            <div class="text-center mt-8">
                <p class="text-white/70 text-sm font-medium">
                    <i class="fas fa-shield-alt mr-2"></i>Sistema seguro de gestión inmobiliaria
                </p>
            </div>
        </div>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        // Efecto de escritura en placeholder (opcional)
        const usuarioInput = document.getElementById('usuario');
        usuarioInput.addEventListener('focus', function() {
            this.style.transform = 'scale(1.01)';
        });
        usuarioInput.addEventListener('blur', function() {
            this.style.transform = 'scale(1)';
        });

        const passwordInput = document.getElementById('password');
        passwordInput.addEventListener('focus', function() {
            this.style.transform = 'scale(1.01)';
        });
        passwordInput.addEventListener('blur', function() {
            this.style.transform = 'scale(1)';
        });
    </script>
</body>
</html>
